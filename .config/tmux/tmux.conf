set -g default-terminal "xterm-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-256color:RGB"

# set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# set -g allow-passthrough all

setw -g monitor-activity on
set -g visual-activity off
set -g status-position top

set -g focus-events on
set -g mouse on
set -g set-clipboard on
set -sg escape-time 0
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 1
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "󰑓  Config reloaded"

bind-key b set-option status

unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind g display-popup -E -w 80% -h 75% -d "#{pane_current_path}" "zsh"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z

bind > swap-pane -D
bind < swap-pane -U

bind-key -r Left  swap-window -t -1 \; previous-window
bind-key -r Right swap-window -t +1 \; next-window

setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
unbind-key -T copy-mode-vi MouseDragEnd1Pane
bind Enter copy-mode

bind-key -n S-Enter run-shell "tmux send-keys -t '#{pane_id}' $'\\033[13;2u'"

# ───────────────────────────────────────────────────────────────────────────

bind-key "t" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

set-environment -g COLORTERM "truecolor"
set-environment -g LANG "en_US.UTF-8"
set-environment -g LC_ALL "en_US.UTF-8"
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# set -g @resurrect-capture-pane-contents 'on'
# set -g @resurrect-strategy-nvim 'session'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── colors (defaults; overridden by matugen-colors.conf) ───────────────────
set -gq @thm_bg                    "#0c0c0c"
set -gq @thm_status_bg             "#080808"
set -gq @thm_active_bg             "#1e1e1e"
set -gq @thm_fg                    "#505050"
set -gq @thm_fg_bright             "#e8e8e8"
set -gq @thm_active_fg             "#f2f2f2"
set -gq @thm_accent                "#a0a0a0"
set -gq @thm_border                "#252525"
set -gq @thm_prefix_bg             "#2e2e2e"
set -gq @thm_prefix_fg             "#ffffff"
set -gq @thm_copy_fg               "#c8c8c8"
set -gq @thm_zoom_fg               "#787878"

source-file ~/.config/tmux/matugen-colors.conf

set -g status-style                 "bg=#{@thm_status_bg},fg=#{@thm_fg}"
set -g status-left                  "#{?client_prefix,#[bg=#{@thm_prefix_bg} fg=#{@thm_prefix_fg} bold],#[fg=#{@thm_accent} bold]} #S #{?client_prefix,#[bg=default fg=#{@thm_border}],#[fg=#{@thm_border}]}│ "
set -g status-right                 "#{?window_zoomed_flag,#[fg=#{@thm_zoom_fg}]  ZOOM ,}#{?pane_in_mode,#[fg=#{@thm_copy_fg}]  COPY ,}#[fg=#{@thm_fg}] %H:%M "
set -g status-right-length          36
set -g status-left-length           32

set -g window-status-format         "#[fg=#{@thm_fg}] #I #W "
set -g window-status-current-format "#[fg=#{@thm_active_fg},bg=#{@thm_active_bg}] #I #W "
set -g window-status-style          "fg=#{@thm_fg}"
set -g window-status-current-style  "fg=#{@thm_active_fg},bg=#{@thm_active_bg}"
set -g window-status-separator      ""
set -g status-justify               left

set -g pane-border-style            "fg=#{@thm_border}"
set -g pane-active-border-style     "fg=#{@thm_accent}"
set -g message-style                "bg=#{@thm_active_bg},fg=#{@thm_fg_bright}"
set -g message-command-style        "bg=#{@thm_active_bg},fg=#{@thm_accent}"

set -g mode-style                   "bg=#{@thm_fg_bright},fg=#{@thm_bg}"
# ───────────────────────────────────────────────────────────────────────────

run '~/.config/tmux/plugins/tpm/tpm'
