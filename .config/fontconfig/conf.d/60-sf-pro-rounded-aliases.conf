<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <match target="pattern">
    <test name="family" compare="eq">
      <string>SF Pro Rounded Bold</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Rounded</string>
    </edit>
    <edit name="style" mode="assign" binding="strong">
      <string>Bold</string>
    </edit>
    <edit name="weight" mode="assign" binding="strong">
      <const>bold</const>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" compare="eq">
      <string>SF Pro Rounded Heavy</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Rounded</string>
    </edit>
    <edit name="style" mode="assign" binding="strong">
      <string>Heavy</string>
    </edit>
    <edit name="weight" mode="assign" binding="strong">
      <const>heavy</const>
    </edit>
  </match>
</fontconfig>
