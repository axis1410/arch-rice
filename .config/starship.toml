add_newline = false

format = """$all$directory$git_branch${custom.git_status_dirty}$git_status$cmd_duration$status$character"""

right_format = ""

command_timeout = 2000

palette = 'colors'

[palettes.colors]
color1 = '#b3c5ff'
color2 = '#192e60'
color3 = '#c5c6d0'
color4 = '#1e1f25'
color5 = '#192e60'
color6 = '#121318'
color7 = '#121318'
color8 = '#b3c5ff'
color9 = '#e1bbdc'
color_error = '#ffb4ab'

[character]
success_symbol = "[❱](color9)"
error_symbol = "[❱](color_error)"
vicmd_symbol = "[❰](color9)"

[python]
format = '[(\($virtualenv\) )]($style)'
style = 'color3'

[directory]
style = "color1"
truncation_length = 1
truncation_symbol = ""
fish_style_pwd_dir_length = 1

[git_branch]
format = '[$branch]($style)'
style = 'bold color8'

[git_status]
format = "[($ahead_behind$stashed)]($style) "
style = "color9"
stashed = "≡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

[custom.git_status_dirty]
when = 'test -n "$(git status --porcelain 2>/dev/null)"'
symbol = "•"
style = "color3"
format = "[$symbol]($style)"
shell = ["zsh", "--no-rcs", "--no-globalrcs"]

[cmd_duration]
format = '[$duration]($style) '

[line_break]
disabled = true

[status]
disabled = false
pipestatus = true
format = '[$symbol$int]($style)'
symbol = '✘'
pipestatus_format = '\[$pipestatus\]($style)'
