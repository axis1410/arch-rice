source = ~/.config/hypr/modules/matugen/colors.conf

$font = SF Pro Display
$font_bold = SF Pro Display Bold
$clock_font = PP Neue Machina Plain Ultrabold

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 2, linear
    animation = fadeOut, 1, 2, linear
    animation = inputFieldDots, 1, 1, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 2
    # inner_color = $inverse_on_surface
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = $source_color $primary $tertiary 45deg
    check_color = $primary $secondary 120deg
    fail_color = $error $error_container 40deg

    font_color = $on_surface
    fade_on_empty = false
    rounding = 26

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL

    # uncomment if you wish to display a message during authentication
    check_text = Authenticating...

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -280
    halign = center
    valign = center
}

# TIME (hours)
label {
    monitor =
    text = cmd[update:60000] date +"%H"
    font_size = 260
    font_family = $clock_font
    color = $primary

    position = 0, -280
    halign = center
    valign = top
}

# TIME (minutes)
label {
    monitor =
    text = cmd[update:60000] date +"%M"
    font_size = 260
    font_family = $clock_font
    color = $secondary

    position = -30, 0
    position = 0, -600
    halign = center
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%a, %B %d" # update every 60 seconds
    font_size = 45
    font_family = $clock_font
    color = $on_surface
    position = 0, -170

    halign = center
    valign = top
}

