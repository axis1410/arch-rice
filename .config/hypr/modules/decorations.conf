general {
    gaps_in = 8
    gaps_out = 14
    border_size = 2
    col.active_border = $accent $accent $accent3 45deg
    col.inactive_border = $bg3 $bg1 45deg
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 2.8
    active_opacity = 1.0
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0
    dim_inactive = true
    dim_strength = 0.08

    shadow {
	enabled = true
	range = 24
	render_power = 3
	sharp = false
	color = $shadow
	color_inactive = $bg1
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.008
        contrast = 1.08
        brightness = 0.95
        vibrancy = 0.18
        vibrancy_darkness = 0.3
        new_optimizations = true
        ignore_opacity = false
        xray = false
        special = true
        popups = true
        popups_ignorealpha = 0.3
    }
}

group {
    col.border_active = $accent $accent $accent3 45deg
    col.border_inactive = $bg3 $bg3 45deg

    groupbar {
        font_size = 11
        gradients = true
        col.active = $bg3 $accent 45deg
        col.inactive = $bg1
        col.locked_active = $bg3
        col.locked_inactive = $bg3
    }
}



# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

